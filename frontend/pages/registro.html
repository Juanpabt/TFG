<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro · Barber O.R.Z Studio</title>
    <link rel="icon" type="image/jpeg" href="../img/Barberia_Logo.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/registro.css">
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>

<a href="index.html" class="back-link">← Inicio</a>

<div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="card-header">
        <img src="../img/Barberia Logo.jpeg" alt="Logo">
        <h1>Barber O.R.Z</h1>
        <p>Studio · Nueva cuenta</p>
    </div>

    <div class="card-body">
        <div class="msg error"   id="errorMsg"></div>
        <div class="msg success" id="successMsg"></div>

        <div class="form-row">
            <div class="form-group">
                <label>Nombre</label>
                <div class="input-wrap">
                    <span>👤</span>
                    <input type="text" id="nombre" placeholder="Tu nombre">
                </div>
            </div>
            <div class="form-group">
                <label>Apellidos</label>
                <div class="input-wrap">
                    <span>👤</span>
                    <input type="text" id="apellidos" placeholder="Tus apellidos">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <div class="input-wrap">
                <span>📞</span>
                <input type="tel" id="telefono" placeholder="612 345 678">
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <div class="input-wrap">
                <span>✉</span>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <div class="input-wrap">
                <span>🔒</span>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres">
            </div>
        </div>

        <div class="form-group">
            <label>Repetir contraseña</label>
            <div class="input-wrap">
                <span>🔒</span>
                <input type="password" id="password2" placeholder="Repite la contraseña">
            </div>
        </div>

        <button class="btn-registro" id="btnRegistro">Crear cuenta</button>

        <div class="divider"><span>¿Ya tienes cuenta?</span></div>

        <div class="card-footer">
            <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>
</div>

<script src="../js/registro.js"></script>
</body>
</html>
